services:
  - type: web
    name: building-ml-api
    runtime: python
    runtimeVersion: 3.12
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: PIP_DEFAULT_TIMEOUT
        value: 600
    routes:
      - type: http
        path: /
    numInstances: 1
    region: oregon

  - type: web
    name: building-ml-ui
    runtime: node
    runtimeVersion: 20
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
    numInstances: 1
    region: oregon
    routes:
      - type: http
        path: /